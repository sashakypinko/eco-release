replicaCount: 1

image:
  repository: registry.digitalocean.com/tetheree-registry/eco-release
  tag: latest
  pullPolicy: Always
  pullSecret: ""

externalDatabase:
  enabled: false
  host: ""
  port: 3306
  user: ""
  password: ""
  name: ""

secrets:
  create: false
  name: eco-release-secrets

env:
  PORT: "5000"
  DB_PROVIDER: "mysql"

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

ingress:
  enabled: false
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: ""
  hosts:
    - host: release.eco.tetheree.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: eco-release-tls
      hosts:
        - release.eco.tetheree.com

healthCheck:
  enabled: false
  path: /api/health

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

migration:
  enabled: false

extraEnvVars: []
extraVolumes: []
extraVolumeMounts: []
