services:
  app:
    build: .
    ports:
      - "5012:5000"          # host 5012 → container 5000
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets the container reach host MySQL
    environment:
      NODE_ENV: production
      PORT: "5000"
      MYSQL_HOST: host.docker.internal
      MYSQL_PORT: "3307"
      MYSQL_USER: root
      MYSQL_PASSWORD: Password123
      MYSQL_DATABASE: tetheree_admin
      SESSION_SECRET: local-dev-secret-change-me
    restart: unless-stopped
