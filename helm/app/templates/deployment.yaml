apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eco-release.fullname" . }}
  labels:
    {{- include "eco-release.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "eco-release.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        rollme: {{ randAlphaNum 5 | quote }}
      labels:
        {{- include "eco-release.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.image.pullSecret }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
      {{- end }}
      {{- if .Values.securityContext }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- end }}
      {{- if .Values.migration.enabled }}
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for database at $MYSQL_HOST:$MYSQL_PORT..."
              until nc -z -w2 "$MYSQL_HOST" "$MYSQL_PORT" 2>/dev/null; do
                echo "Database not ready, retrying in 3s..."
                sleep 3
              done
              echo "Database is reachable"
          env:
            - name: MYSQL_HOST
              value: {{ include "eco-release.databaseHost" . | quote }}
            - name: MYSQL_PORT
              value: {{ include "eco-release.databasePort" . | quote }}
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Running migrations..."
              npx tsx node_modules/typeorm/cli.js migration:run -d server/src/database/typeorm.datasource.ts
              echo "Migrations complete (exit code: $?)"
          env:
            - name: DB_PROVIDER
              value: {{ .Values.env.DB_PROVIDER | default "mysql" | quote }}
            {{- if .Values.externalDatabase.enabled }}
            - name: MYSQL_HOST
              value: {{ include "eco-release.databaseHost" . | quote }}
            - name: MYSQL_PORT
              value: {{ include "eco-release.databasePort" . | quote }}
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: MYSQL_USER
                  optional: true
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: MYSQL_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: MYSQL_DATABASE
                  optional: true
            {{- end }}
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.externalDatabase.enabled }}
            - name: MYSQL_HOST
              value: {{ include "eco-release.databaseHost" . | quote }}
            - name: MYSQL_PORT
              value: {{ include "eco-release.databasePort" . | quote }}
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: MYSQL_USER
                  optional: true
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: MYSQL_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: MYSQL_DATABASE
                  optional: true
            {{- end }}
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: SESSION_SECRET
            - name: NODE_ENV
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: NODE_ENV
                  optional: true
            {{- range .Values.extraEnvVars }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- if .Values.healthCheck.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.healthCheck.path }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ .Values.healthCheck.path }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml .Values.extraVolumeMounts | nindent 12 }}
          {{- end }}
      {{- if .Values.extraVolumes }}
      volumes:
        {{- toYaml .Values.extraVolumes | nindent 8 }}
      {{- end }}
