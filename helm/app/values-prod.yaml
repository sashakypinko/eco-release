replicaCount: 1

image:
  tag: override-via-pipeline
  pullSecret: acr-secret

externalDatabase:
  enabled: true
  host: override-via-pipeline
  port: 3306
  user: override-via-pipeline
  password: override-via-pipeline
  name: override-via-pipeline

secrets:
  create: false

env:
  PORT: "5000"
  DB_PROVIDER: "mysql"
  VIDEO_WIDGET_BASE_URL: "https://video-widgets.tetheree.com"

ingress:
  enabled: true
  hosts:
    - host: release.eco.tetheree.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: eco-release-tls
      hosts:
        - release.eco.tetheree.io

healthCheck:
  enabled: true
  path: /api/health

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

migration:
  enabled: false
